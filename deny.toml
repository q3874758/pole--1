# cargo-deny configuration for PoLE
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
# Multiple versions of the same crate are allowed; pinning is the
# caller's responsibility per dependency.
all-features = false

[advisories]
# Pull the RustSec advisory DB. Empty `db-path` uses the default
# (`~/.cargo/advisory-db`).
db-path = "~/.cargo/advisory-db"
# `yanked` is informational only by default.
yanked = "warn"
# We don't pin to a specific advisory DB version; CI should
# refresh it.
db-urls = ["https://github.com/rustsec/advisory-db"]

[licenses]
# Allow MIT / Apache-2.0 / BSD / ISC / Zlib / Unicode / 0BSD /
# MPL-2.0 (the last only with explicit file-level exception —
# see the project policy doc).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "0BSD",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
    "BSL-1.0",
    "Unicode-2.0",
    "Zlib-acknowledgement",
]
# Hard denials — these will fail CI.
deny = [
    "GPL-1.0",
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-1.0",
    "AGPL-3.0",
    "SSPL-1.0",
    "Commons-Clause",
    "Elastic-2.0",
]
confidence-threshold = 0.8

# Crates whose license expression is not on the SPDX allow/deny
# list. We list them with the precise expression so reviewers
# know what to expect.
[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0fd23 },
]

[[licenses.clarify]]
crate = "webpki"
expression = "ISC"
license-files = [
    { path = "LICENSE", hash = 0x0017230 },
]

[[licenses.clarify]]
crate = "core2"
expression = "MIT"
license-files = [
    { path = "LICENSE", hash = 0x0 },
]

[bans]
# Multiple versions of the same crate are common in Rust
# workspaces; we don't fail CI on that, but we *do* surface it
# for review.
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
# Skip workspace-internal duplicates that are intentional
# (e.g. a feature-gated re-export of an internal crate).
exclude = []

[sources]
# Only allow crates.io and the vendored path override declared in
# Cargo.toml. No git deps, no alternative registries.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

# A small set of crates that need special handling for yanked
# warnings (we still want them in the build but want the warning
# silenced because the crate is intentional).
# [[exceptions]]
# name = "some-legacy-crate"
# version = "1.2.3"
