syntax = "proto3";

package pole.chain.pole.v1;

option go_package = "x/pole/types";

message MerkleCommitment {
  string root = 1;
  uint32 leaf_count = 2;
}

enum NodeRole {
  NODE_ROLE_UNSPECIFIED = 0;
  NODE_ROLE_PLAYER = 1;
  NODE_ROLE_SERVICE = 2;
  NODE_ROLE_COORDINATOR = 3;
}

message NodeCapabilitySet {
  bool collect = 1;
  bool store = 2;
  bool verify = 3;
  bool propose = 4;
}

message NodeRecord {
  string operator_address = 1;
  string reward_address = 2;
  string consensus_address = 3;
  NodeRole role = 4;
  NodeCapabilitySet capabilities = 5;
  bool active = 6;
  uint64 bonded_tokens = 7;
  uint64 last_updated_epoch = 8;
}

message Params {
  uint64 reward_block_duration_seconds = 1;
  uint64 base_hourly_reward = 2;
  uint64 target_network_weight_units = 3;
  uint32 reward_adjustment_cap_bps = 4;
  uint64 challenge_window_blocks = 5;
  uint64 min_retention_epochs = 6;
  uint32 player_reward_allocation_bps = 7;
  uint32 service_reward_allocation_bps = 8;
  uint32 collect_reward_bps = 9;
  uint32 store_reward_bps = 10;
  uint32 verify_reward_bps = 11;
  uint32 propose_reward_bps = 12;
  uint32 tier1_weight_ppm = 13;
  uint32 tier2_weight_min_ppm = 14;
  uint32 tier2_weight_max_ppm = 15;
  uint32 tier3_weight_min_ppm = 16;
  uint32 tier3_weight_max_ppm = 17;
  uint32 fee_burn_bps = 18;
  uint64 reward_burn_threshold = 19;
  uint32 reward_burn_bps = 20;
  uint32 governance_burn_bps = 21;
}

message BatchCommit {
  uint64 epoch_id = 1;
  string collector_address = 2;
  uint64 slot_start = 3;
  uint64 slot_end = 4;
  MerkleCommitment batch = 5;
  string payload_cid = 6;
  uint32 observation_count = 7;
  int64 submitted_at_height = 8;
}

message AvailabilityRecord {
  uint64 epoch_id = 1;
  string operator_address = 2;
  string payload_cid = 3;
  uint64 retention_until_epoch = 4;
  string receipt_hash_hex = 5;
}

message RewardRecord {
  uint64 epoch_id = 1;
  string recipient = 2;
  uint64 player_reward = 3;
  uint64 collect_reward = 4;
  uint64 store_reward = 5;
  uint64 verify_reward = 6;
  uint64 propose_reward = 7;
  uint64 slash_debit = 8;
  uint64 net_reward = 9;
}

message AggregateRecord {
  uint64 epoch_id = 1;
  uint32 app_id = 2;
  uint64 total_weight_units = 3;
  uint64 player_count = 4;
}

message EpochCommit {
  uint64 epoch_id = 1;
  MerkleCommitment accepted_batches = 2;
  MerkleCommitment observations = 3;
  MerkleCommitment aggregates = 4;
  MerkleCommitment rewards = 5;
  MerkleCommitment availability = 6;
  string randomness_seed_hex = 7;
  string proposer_address = 8;
  int64 challenge_open_height = 9;
  int64 challenge_deadline_height = 10;
  bool finalized = 11;
  uint64 total_network_weight_units = 12;
}

enum ChallengeKind {
  CHALLENGE_KIND_UNSPECIFIED = 0;
  CHALLENGE_KIND_BAD_BATCH = 1;
  CHALLENGE_KIND_OMISSION = 2;
  CHALLENGE_KIND_BAD_AGGREGATE = 3;
  CHALLENGE_KIND_BAD_REWARD = 4;
  CHALLENGE_KIND_BAD_STORAGE = 5;
}

enum ChallengeState {
  CHALLENGE_STATE_UNSPECIFIED = 0;
  CHALLENGE_STATE_OPEN = 1;
  CHALLENGE_STATE_RESOLVED = 2;
  CHALLENGE_STATE_REJECTED = 3;
}

message ChallengeEvidenceRef {
  string batch_root_hex = 1;
  string aggregate_root_hex = 2;
  string reward_root_hex = 3;
  string payload_cid = 4;
  repeated string merkle_proof_hex = 5;
  uint32 aggregate_app_id = 6;
}

message Challenge {
  string challenge_id_hex = 1;
  ChallengeKind kind = 2;
  uint64 epoch_id = 3;
  string target_address = 4;
  string challenger = 5;
  uint64 bond_amount = 6;
  int64 opened_at_height = 7;
  int64 deadline_height = 8;
  ChallengeState state = 9;
  ChallengeEvidenceRef evidence = 10;
  uint64 slash_amount = 11;
  uint64 challenger_reward = 12;
  string resolution_summary = 13;
  string target_cons_address = 14;
}

message GameWeightEntry {
  uint32 app_id = 1;
  uint32 game_weight_ppm = 2;
  string tier = 3;
  uint64 effective_from_epoch_id = 4;
}

message ReplicaReceipt {
  uint64 epoch_id = 1;
  string payload_cid = 2;
  string storer_address = 3;
  uint64 retention_until_epoch = 4;
  string receipt_signature = 5;
  string receipt_hash_hex = 6;
}

message ClaimedReward {
  uint64 epoch_id = 1;
  string recipient = 2;
  int64 claimed_at_height = 3;
  uint64 amount = 4;
}
