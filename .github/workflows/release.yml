name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      skip_signing:
        description: "Skip code signing (for testing)"
        required: false
        default: "false"
        type: boolean

env:
  CARGO_TERM_COLOR: always
  VERSION: ${{ github.ref_name }}

jobs:
  release-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        run: |
          cargo build --release --manifest-path Cargo.toml
          strip target/release/pole-node target/release/pole-client

      - name: Build DEB package
        run: |
          mkdir -p dist/packages/deb-build/DEBIAN
          mkdir -p dist/packages/deb-build/etc/systemd/system
          mkdir -p dist/packages/deb-build/etc/pole
          mkdir -p dist/packages/deb-build/var/lib/pole
          mkdir -p dist/packages/deb-build/var/log/pole
          mkdir -p dist/packages/deb-build/opt/pole

          cp target/release/pole-node dist/packages/deb-build/opt/pole/
          cp target/release/pole-client dist/packages/deb-build/opt/pole/
          cp packaging/linux/deb/pole-node.service dist/packages/deb-build/etc/systemd/system/
          cp packaging/linux/deb/control dist/packages/deb-build/DEBIAN/
          cp packaging/linux/deb/postinst dist/packages/deb-build/DEBIAN/postinst
          cp packaging/linux/deb/prerm dist/packages/deb-build/DEBIAN/prerm
          chmod 755 dist/packages/deb-build/DEBIAN/postinst dist/packages/deb-build/DEBIAN/prerm

          dpkg-deb --build dist/packages/deb-build dist/packages/pole-node_${VERSION}_amd64.deb

      - name: Compute checksums
        run: |
          cd dist/packages
          sha256sum pole-node_${VERSION}_amd64.deb > pole-node_${VERSION}_amd64.deb.sha256

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            dist/packages/pole-node_${VERSION}_amd64.deb
            dist/packages/pole-node_${VERSION}_amd64.deb.sha256

  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        run: cargo build --release --features gui --manifest-path Cargo.toml

      - name: Setup WiX
        run: |
          mkdir -p tools/wix
          if (!(Test-Path "tools/wix/candle.exe")) {
            Invoke-WebRequest -Uri "https://github.com/wixtoolset/wix3/releases/download/wix314rtm/wix314-binaries.zip" -OutFile "tools/wix.zip"
            Expand-Archive -Path "tools/wix.zip" -DestinationPath "tools/wix" -Force
            Remove-Item "tools/wix.zip"
          }

      - name: Generate icon
        run: |
          if (!(Test-Path "packaging/windows/pole.ico")) {
            powershell -ExecutionPolicy Bypass -File "packaging/windows/generate-icon.ps1"
          }

      - name: Build MSI installer
        run: |
          mkdir dist/packages
          $env:RootDir = $PWD.Path
          & "tools/wix/candle.exe" -nologo -ext WixUIExtension `
            -dRootDir="$env:RootDir" `
            -dSourceDir="target/release" `
            "packaging/windows/Product.wxs" `
            -out "dist/packages/Product.wixobj"
          & "tools/wix/light.exe" -nologo -ext WixUIExtension `
            "dist/packages/Product.wixobj" `
            -out "dist/packages/PoLE-Desktop-$env:VERSION-x64.msi"

      - name: Create portable zip
        run: |
          Compress-Archive -Path target/release/pole-gui.exe,target/release/pole-client.exe,target/release/pole-node.exe -DestinationPath dist/packages/PoLE-$env:VERSION-x64-portable.zip -Force

      - name: Compute checksums
        run: |
          cd dist/packages
          Get-ChildItem *.exe | ForEach-Object { certutil -hashfile $_.FullName SHA256 | Select-String -Pattern "^[a-f0-9]{64}" > "$($_.BaseName).sha256" }
          Get-ChildItem *.msi | ForEach-Object { certutil -hashfile $_.FullName SHA256 | Select-String -Pattern "^[a-f0-9]{64}" > "$($_.BaseName).sha256" }
          Get-ChildItem *.zip | ForEach-Object { certutil -hashfile $_.FullName SHA256 | Select-String -Pattern "^[a-f0-9]{64}" > "$($_.BaseName).sha256" }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            dist/packages/*.msi
            dist/packages/*.zip
            dist/packages/*.sha256

  release-github:
    needs: [release-linux, release-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # Required for `cosign sign-blob` keyless signing
      # (OIDC token from GitHub Actions).
      id-token: write
      # Required for `cosign sign-blob` to write the signing
      # certificate back into the GitHub Actions cache (used to
      # verify against Rekor).
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create portable tarball (Linux binary + client)
        run: |
          mkdir -p dist/release
          cp artifacts/linux-artifacts/pole-node_${VERSION}_amd64.deb dist/release/
          cp artifacts/windows-artifacts/PoLE-${VERSION}-x64-portable.zip dist/release/
          cp artifacts/windows-artifacts/PoLE-${VERSION}-x64.msi dist/release/
          cp artifacts/linux-artifacts/*.sha256 dist/release/
          cp artifacts/windows-artifacts/*.sha256 dist/release/

      - name: Build pole-sbom
        run: cargo build --release --bin pole-sbom

      - name: Emit CycloneDX SBOM
        run: |
          ./target/release/pole-sbom \
            --manifest-path Cargo.toml \
            --format cyclonedx \
            --out dist/release/sbom.cyclonedx.json

      - name: Emit SPDX SBOM
        run: |
          ./target/release/pole-sbom \
            --manifest-path Cargo.toml \
            --format spdx \
            --out dist/release/sbom.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign SBOMs with cosign (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          for sbom in dist/release/sbom.cyclonedx.json dist/release/sbom.spdx.json; do
            echo "==> Signing $sbom"
            cosign sign-blob \
              --output-signature "${sbom}.sig" \
              --output-certificate "${sbom}.pem" \
              --yes \
              "$sbom"
          done

      - name: Verify signatures
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          for sbom in dist/release/sbom.cyclonedx.json dist/release/sbom.spdx.json; do
            echo "==> Verifying $sbom"
            cosign verify-blob \
              --signature "${sbom}.sig" \
              --certificate "${sbom}.pem" \
              --certificate-identity-regexp 'https://github.com/q3874758/pole--1' \
              --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
              "$sbom"
          done

      - name: Generate release notes
        run: |
          cat > dist/release/RELEASE_NOTES.md << 'EOF'
          # PoLE ${VERSION} Release Notes

          ## Downloads
          - **Windows MSI**: `PoLE-${VERSION}-x64.msi` - Full installer with shortcuts
          - **Windows Portable**: `PoLE-${VERSION}-x64-portable.zip` - No installation required
          - **Linux DEB**: `pole-node_${VERSION}_amd64.deb` - For Debian/Ubuntu systems

          ## Software Bill of Materials (SBOM)
          - `sbom.cyclonedx.json` — CycloneDX 1.5, signed with [cosign](https://docs.sigstore.dev/)
          - `sbom.spdx.json` — SPDX 2.3, signed with cosign
          - Each `.sig` / `.pem` pair proves the SBOM was produced by
            this repository's CI at tag `${VERSION}`.

          ## Verifying SBOM signatures
          ```bash
          # Requires cosign >= 2.0
          cosign verify-blob \
            --signature sbom.cyclonedx.json.sig \
            --certificate sbom.cyclonedx.json.pem \
            --certificate-identity-regexp 'https://github.com/q3874758/pole--1' \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            sbom.cyclonedx.json
          ```

          ## What's New
          - Full PoLE protocol implementation with hour-based reward blocks
          - P2P network with libp2p (QUIC, TCP, mDNS, Kademlia)
          - Local Web GUI control console
          - Windows Service and Linux systemd integration
          - Automatic update with rollback support
          - Challenge and dispute resolution system

          ## Windows Installation
          ### MSI (Recommended)
          1. Download `PoLE-${VERSION}-x64.msi`
          2. Double-click to install
          3. Launch from Start Menu or Desktop shortcut

          ### Portable
          1. Download `PoLE-${VERSION}-x64-portable.zip`
          2. Extract to any folder
          3. Run `pole-gui.exe`

          ## Linux Installation
          ```bash
          sudo dpkg -i pole-node_${VERSION}_amd64.deb
          sudo systemctl enable pole-node
          sudo systemctl start pole-node
          ```

          ## Verification
          Checksums are provided in `.sha256` files alongside each artifact.
          SBOM signatures are provided as `.sig` / `.pem` pairs.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            dist/release/*
          body_path: dist/release/RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
